<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VitBud</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <h1 id="app-title">VitBud</h1>
    
    <div class="toolbar">
      <button id="measure-all" disabled>計測開始</button>
      <button id="download-all" disabled>一括ダウンロード(CSV)</button>
    </div>

    <div class="grid">
      <section class="panel" id="max-panel">
        <h2 class="section-title">MAX センサデータ（心拍・脈波）</h2>
        <div class="panel-actions">
          <button id="add-max-device" class="add-device-btn">＋ MAX デバイス追加</button>
          <span id="max-count" class="tiny-muted">0 / 5</span>
        </div>
        <div class="subgrid" id="max-device-list"></div>
      </section>

      <section class="panel" id="mlx-panel">
        <h2 class="section-title">MLX センサデータ（鼓膜温度）</h2>
        <div class="panel-actions">
          <button id="add-mlx-device" class="add-device-btn">＋ MLX デバイス追加</button>
          <span id="mlx-count" class="tiny-muted">0 / 5</span>
        </div>
        <div class="subgrid" id="mlx-device-list"></div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
